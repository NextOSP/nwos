image: ubuntu:24.04

stages:
  - base
  - all

variables:
  POSTGRESQL_VERSION: "14"

job_test_base:
  stage: base
  script:
    - apt-get update
    - apt-get install -y git locales
    - git clone -b 3.0 https://gitlab.com/nwos-hq/build-tools.git ${CI_PROJECT_DIR}/build-tools
    - export PATH=${CI_PROJECT_DIR}/build-tools/gitlab-ci:${PATH}
    - gitlab_ci_install_nwos
    - su - nwos -c "export PATH=${CI_PROJECT_DIR}/build-tools/gitlab-ci:${PATH} && gitlab_test_nwos --build=base"

job_test_all:
  stage: all
  script:
    - apt-get update
    - apt-get install -y git locales
    - git clone -b 3.0 https://gitlab.com/nwos-hq/build-tools.git ${CI_PROJECT_DIR}/build-tools
    - export PATH=${CI_PROJECT_DIR}/build-tools/gitlab-ci:${PATH}
    - gitlab_ci_install_nwos
    - su - nwos -c "export PATH=${CI_PROJECT_DIR}/build-tools/gitlab-ci:${PATH} && gitlab_test_nwos --build=all"
