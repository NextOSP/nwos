apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextosp-backups
  namespace: nextosp
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextosp-postgres-backup
  namespace: nextosp
spec:
  schedule: "15 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: postgres:16-alpine
              env:
                - name: PGHOST
                  value: nextosp-postgres
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: nextosp-secret
                      key: db-name
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: nextosp-secret
                      key: db-user
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: nextosp-secret
                      key: db-password
              command:
                - /bin/sh
                - -ceu
                - |
                  timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
                  pg_dump -Fc --no-owner --no-acl > "/backups/nwos-${timestamp}.dump"
                  find /backups -type f -name 'nwos-*.dump' -mtime +14 -delete
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: nextosp-backups
