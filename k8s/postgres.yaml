apiVersion: v1
kind: Service
metadata:
  name: nextosp-postgres
  namespace: nextosp
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app: nextosp-postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nextosp-postgres
  namespace: nextosp
spec:
  serviceName: nextosp-postgres
  replicas: 1
  selector:
    matchLabels:
      app: nextosp-postgres
  template:
    metadata:
      labels:
        app: nextosp-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: nextosp-secret
                  key: db-name
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: nextosp-secret
                  key: db-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextosp-secret
                  key: db-password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
